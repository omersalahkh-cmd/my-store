<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav { background: white; padding: 10px; display: flex; justify-content: center; gap: 20px; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px; max-width: 1200px; margin: auto; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; text-align: center; padding-bottom: 20px; }
        .product-card:hover { transform: translateY(-5px); }
        .img-placeholder { background: #ddd; height: 200px; display: flex; align-items: center; justify-content: center; color: #666; }
        .price { color: var(--accent); font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>متجر التقنية الحديثة</h1>
    <p>مشروع مادة تطوير الويب</p>
</header>

<div class="nav">
    <span>الرئيسية</span> | <span>المنتجات</span> | <span>عن المتجر</span>
</div>

<div class="container">
    <div class="product-card">
        <div class="img-placeholder">صورة المنتج</div>
        <h3>هاتف ذكي</h3>
        <p class="price">500$</p>
        <button class="btn">إضافة للسلة</button>
    </div>
    <div class="product-card">
        <div class="img-placeholder">صورة المنتج</div>
        <h3>لابتوب احترافي</h3>
        <p class="price">1200$</p>
        <button class="btn">إضافة للسلة</button>
    </div>
    <div class="product-card">
        <div class="img-placeholder">صورة المنتج</div>
        <h3>ساعة ذكية</h3>
        <p class="price">150$</p>
        <button class="btn">إضافة للسلة</button>
    </div>
</div>

</body>
</html>
